name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check qspace_myelin/

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core dependencies
        run: pip install numpy nibabel scipy matplotlib
      - name: Check Python syntax
        run: |
          python -m py_compile qspace_myelin/myelin_map.py
          python -m py_compile qspace_myelin/gui.py
          echo "All syntax checks passed."
      - name: Check shell script syntax
        run: bash -n qspace_myelin/pipeline_myelin_map.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
