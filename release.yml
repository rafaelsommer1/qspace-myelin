name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on: git tag v0.1.0 && git push --tags

jobs:
  # ── 1. Publish to PyPI ────────────────────────────────────────────────────
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API key needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — configure at:
        # https://pypi.org/manage/account/publishing/

  # ── 2. Standalone binaries (PyInstaller) ────────────────────────────────
  binaries:
    name: Binary (${{ matrix.os }})
    needs: pypi
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: qspace-myelin-linux-x86_64
            ext: ""
          - os: macos-13
            artifact: qspace-myelin-macos-x86_64
            ext: ""
          - os: macos-14
            artifact: qspace-myelin-macos-arm64
            ext: ""
          - os: windows-latest
            artifact: qspace-myelin-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 numpy nibabel scipy matplotlib

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --name "myelin-map-gui${{ matrix.ext }}" \
            --add-data "qspace_myelin/pipeline_myelin_map.sh:qspace_myelin" \
            --hidden-import "qspace_myelin" \
            qspace_myelin/gui.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --name "myelin-map-gui${{ matrix.ext }}" `
            --add-data "qspace_myelin\pipeline_myelin_map.sh;qspace_myelin" `
            --hidden-import "qspace_myelin" `
            --windowed `
            qspace_myelin/gui.py

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/myelin-map-gui${{ matrix.ext }}

  # ── 3. Create GitHub Release with binaries attached ──────────────────────
  github-release:
    name: GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist-all/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-all/**/*
